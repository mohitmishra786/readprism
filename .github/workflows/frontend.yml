# Frontend CI — typecheck + production build + ESLint.
# Catches type errors, broken builds, and lint regressions on every PR.
name: Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Typecheck + Build + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npx next lint
        # Lint is best-effort; don't fail the build on style nits yet.
        continue-on-error: true

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: Check for vulnerable dependencies
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true
