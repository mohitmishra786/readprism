# Frontend CI — typecheck + production build + ESLint.
# Catches type errors, broken builds, and lint regressions on every PR.
name: Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      # NOTE: `next lint` was removed in Next.js 16 and no ESLint config is set up
      # in this project, so typecheck + a strict production build are the gates.
      # (Adding an ESLint flat config is tracked as a follow-up.)

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: Check for vulnerable dependencies
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true
