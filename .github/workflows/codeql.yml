# CodeQL semantic code analysis — runs on every PR and weekly on main.
# Catches security vulnerabilities (SQL injection, XSS, path traversal, etc.)
# that dependency scanning misses.
name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan of the default branch — Mondays 02:00 UTC.
    - cron: "0 2 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Python (backend) + JavaScript/TypeScript (frontend).
        language: [python, javascript-typescript]

    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Use the default security-and-quality suite for deeper analysis.
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
