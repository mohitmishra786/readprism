version: "3.9"

# Local development overrides
services:
  backend:
    volumes:
      - ./backend:/app
    environment:
      APP_ENV: development

  # The queue workers already mount ./backend via the x-worker-base anchor;
  # here we just flip them to development mode for local runs.
  worker-scrape:
    environment:
      APP_ENV: development

  worker-embed:
    environment:
      APP_ENV: development

  worker-digest:
    environment:
      APP_ENV: development

  beat:
    volumes:
      - ./backend:/app

  frontend:
    volumes:
      - ./frontend/src:/app/src
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
