version: "3.9"

networks:
  readprism_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:

# Shared config for the queue-specific Celery workers (audit 07-2). `x-` keys are
# ignored by Compose; the anchor is merged into each worker service below.
x-worker-base: &worker-base
  image: readprism-backend
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    DATABASE_URL: postgresql+asyncpg://readprism:readprism@db:5432/readprism
    DATABASE_SYNC_URL: postgresql://readprism:readprism@db:5432/readprism
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/2
    BROWSERLESS_URL: http://browserless:3000
    MEILISEARCH_URL: http://meilisearch:7700
    MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-readprism_search_key}
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - readprism_net
  volumes:
    - ./backend:/app
  healthcheck:
    test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    # sentence-transformers model load can take ~60s on first boot; give it room.
    start_period: 90s

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: readprism
      POSTGRES_PASSWORD: readprism
      POSTGRES_DB: readprism
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - readprism_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readprism -d readprism"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - readprism_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://readprism:readprism@db:5432/readprism
      DATABASE_SYNC_URL: postgresql://readprism:readprism@db:5432/readprism
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      BROWSERLESS_URL: http://browserless:3000
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-readprism_search_key}
    # Production-shaped: no --reload here. The dev override adds --reload.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - readprism_net
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # One --pool=solo worker per queue (audit 07-2), so a slow Playwright scrape on
  # the scrape queue can't block embeddings or digest delivery. See
  # docs/adr/0001-celery-solo-pool.md for why each worker is single-process.
  worker-scrape:
    <<: *worker-base
    command: celery -A app.workers.celery_app worker --loglevel=info --pool=solo -Q scrape -n scrape@%h

  worker-embed:
    <<: *worker-base
    command: celery -A app.workers.celery_app worker --loglevel=info --pool=solo -Q embed -n embed@%h

  worker-digest:
    # Also drains the default "celery" queue for any unrouted task.
    <<: *worker-base
    command: celery -A app.workers.celery_app worker --loglevel=info --pool=solo -Q digest,celery -n digest@%h

  beat:
    image: readprism-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://readprism:readprism@db:5432/readprism
      DATABASE_SYNC_URL: postgresql://readprism:readprism@db:5432/readprism
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      BROWSERLESS_URL: http://browserless:3000
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-readprism_search_key}
    command: celery -A app.workers.celery_app beat --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - readprism_net
    volumes:
      - ./backend:/app
    # Liveness: the beat_heartbeat task (scheduled every 60s) writes a short-TTL
    # Redis key. If beat stops scheduling, the key expires and this fails,
    # surfacing an otherwise-silent ingestion/digest stop (audit 07-4).
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys; from app.utils.cache import get_redis; import asyncio; sys.exit(0 if asyncio.run(get_redis().exists('beat:heartbeat')) else 1)\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 150s  # allow first heartbeat + worker warm-up

  meilisearch:
    image: getmeili/meilisearch:v1.6
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-readprism_search_key}
      # production mode enforces the master key (search isn't left open); the dev
      # override switches this back to development locally (audit 07-9).
      MEILI_ENV: production
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - readprism_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7700/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  browserless:
    image: browserless/chrome:1.61.0-puppeteer-21.3.8
    environment:
      MAX_CONCURRENT_SESSIONS: 5
      PREBOOT_CHROME: "true"
    ports:
      - "3000:3000"
    networks:
      - readprism_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - readprism_net
